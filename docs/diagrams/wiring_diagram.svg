<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 900" width="1100" height="900">
  <style>
    .component { fill: #f5f5f5; stroke: #333; stroke-width: 2; }
    .pin { fill: #ddd; stroke: #333; stroke-width: 1; }
    .wire { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .wire-red { stroke: #c0392b; }
    .wire-black { stroke: #2c3e50; }
    .wire-blue { stroke: #2980b9; }
    .wire-green { stroke: #27ae60; }
    .wire-orange { stroke: #e67e22; }
    .wire-purple { stroke: #8e44ad; }
    .wire-gray { stroke: #7f8c8d; }
    .text { font-family: Arial, sans-serif; font-size: 13px; fill: #333; }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .subtitle { font-family: Arial, sans-serif; font-size: 14px; fill: #555; }
    .label { font-family: Arial, sans-serif; font-size: 11px; fill: #444; }
    .chip-label { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
    .note { font-family: Arial, sans-serif; font-size: 12px; fill: #666; }
  </style>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" class="title">Fish Counter — Resistivity Gate Wiring Diagram</text>
  <text x="550" y="58" text-anchor="middle" class="subtitle">NodeMCU v3 + TLC555 + MCP6002 Conductivity Sensor</text>

  <!-- ========== NODECU v3 BOARD ========== -->
  <rect x="720" y="180" width="180" height="460" rx="8" class="component"/>
  <text x="810" y="205" text-anchor="middle" class="chip-label">NodeMCU v3</text>
  <text x="810" y="222" text-anchor="middle" class="note">ESP8266</text>

  <!-- NodeMCU pins -->
  <!-- Left pins -->
  <rect x="710" y="250" width="20" height="12" class="pin"/><text x="705" y="260" text-anchor="end" class="label">D0 GPIO16</text>
  <rect x="710" y="275" width="20" height="12" class="pin"/><text x="705" y="285" text-anchor="end" class="label">D1 GPIO5</text>
  <rect x="710" y="300" width="20" height="12" class="pin"/><text x="705" y="310" text-anchor="end" class="label">D2 GPIO4</text>
  <rect x="710" y="325" width="20" height="12" class="pin"/><text x="705" y="335" text-anchor="end" class="label">D3 GPIO0</text>
  <rect x="710" y="350" width="20" height="12" class="pin"/><text x="705" y="360" text-anchor="end" class="label">D4 GPIO2</text>
  <rect x="710" y="375" width="20" height="12" class="pin"/><text x="705" y="385" text-anchor="end" class="label">3V3</text>
  <rect x="710" y="400" width="20" height="12" class="pin"/><text x="705" y="410" text-anchor="end" class="label">GND</text>
  <rect x="710" y="425" width="20" height="12" class="pin"/><text x="705" y="435" text-anchor="end" class="label">VIN</text>
  <rect x="710" y="450" width="20" height="12" class="pin"/><text x="705" y="460" text-anchor="end" class="label">EN</text>
  <rect x="710" y="475" width="20" height="12" class="pin"/><text x="705" y="485" text-anchor="end" class="label">A0 ADC0</text>
  <rect x="710" y="500" width="20" height="12" class="pin"/><text x="705" y="510" text-anchor="end" class="label">SD3 GPIO10</text>
  <rect x="710" y="525" width="20" height="12" class="pin"/><text x="705" y="535" text-anchor="end" class="label">SD2 GPIO9</text>
  <rect x="710" y="550" width="20" height="12" class="pin"/><text x="705" y="560" text-anchor="end" class="label">SD1 MOSI</text>
  <rect x="710" y="575" width="20" height="12" class="pin"/><text x="705" y="585" text-anchor="end" class="label">CMD</text>

  <!-- Right pins -->
  <rect x="890" y="250" width="20" height="12" class="pin"/><text x="920" y="260" class="label">GPIO14 D5</text>
  <rect x="890" y="275" width="20" height="12" class="pin"/><text x="920" y="285" class="label">GPIO12 D6</text>
  <rect x="890" y="300" width="20" height="12" class="pin"/><text x="920" y="310" class="label">GPIO13 D7</text>
  <rect x="890" y="325" width="20" height="12" class="pin"/><text x="920" y="335" class="label">GPIO15 D8</text>
  <rect x="890" y="350" width="20" height="12" class="pin"/><text x="920" y="360" class="label">3V3</text>
  <rect x="890" y="375" width="20" height="12" class="pin"/><text x="920" y="385" class="label">GND</text>
  <rect x="890" y="400" width="20" height="12" class="pin"/><text x="920" y="410" class="label">5V (USB/VIN)</text>
  <rect x="890" y="425" width="20" height="12" class="pin"/><text x="920" y="435" class="label">GPIO11 SD/CMD</text>
  <rect x="890" y="450" width="20" height="12" class="pin"/><text x="920" y="460" class="label">GPIO7 SD/SDO</text>
  <rect x="890" y="475" width="20" height="12" class="pin"/><text x="920" y="485" class="label">GPIO6 SD/CLK</text>
  <rect x="890" y="500" width="20" height="12" class="pin"/><text x="920" y="510" class="label">GPIO8 SD/SD1</text>
  <rect x="890" y="525" width="20" height="12" class="pin"/><text x="920" y="535" class="label">GPIO9 SD/D2</text>
  <rect x="890" y="550" width="20" height="12" class="pin"/><text x="920" y="560" class="label">GPIO10 SD/D3</text>
  <rect x="890" y="575" width="20" height="12" class="pin"/><text x="920" y="585" class="label">GPIO3 RX</text>

  <!-- USB outline -->
  <rect x="785" y="640" width="50" height="30" rx="4" fill="#ccc" stroke="#333" stroke-width="1"/>
  <text x="810" y="660" text-anchor="middle" class="label">microUSB</text>

  <!-- ========== TLC555 CHIP ========== -->
  <rect x="80" y="220" width="120" height="160" rx="4" class="component"/>
  <circle cx="95" cy="235" r="5" fill="#333"/>
  <text x="140" y="260" text-anchor="middle" class="chip-label">TLC555</text>
  <text x="140" y="280" text-anchor="middle" class="note">~2kHz astable</text>

  <!-- TLC555 pins -->
  <text x="75" y="255" text-anchor="end" class="label">1 GND</text>
  <text x="75" y="285" text-anchor="end" class="label">2 TRIG</text>
  <text x="75" y="315" text-anchor="end" class="label">3 OUT</text>
  <text x="75" y="345" text-anchor="end" class="label">4 RESET</text>
  <text x="205" y="255" class="label">8 VCC</text>
  <text x="205" y="285" class="label">7 DISCH</text>
  <text x="205" y="315" class="label">6 THRESH</text>
  <text x="205" y="345" class="label">5 CTRL</text>

  <!-- Timing components -->
  <rect x="50" y="365" width="50" height="20" class="component"/><text x="75" y="395" text-anchor="middle" class="label">R1 1k</text>
  <rect x="120" y="365" width="50" height="20" class="component"/><text x="145" y="395" text-anchor="middle" class="label">R2 33k</text>
  <rect x="190" y="365" width="40" height="25" class="component"/><text x="210" y="405" text-anchor="middle" class="label">Ct 10nF</text>

  <!-- ========== ELECTRODES / TUBE ========== -->
  <rect x="320" y="300" width="180" height="80" rx="10" fill="#e8f4f8" stroke="#2980b9" stroke-width="2"/>
  <text x="410" y="325" text-anchor="middle" class="label">12mm ID transfer tube</text>

  <!-- Electrode rings -->
  <rect x="345" y="305" width="15" height="70" rx="3" fill="#95a5a6" stroke="#555" stroke-width="1"/>
  <rect x="460" y="305" width="15" height="70" rx="3" fill="#95a5a6" stroke="#555" stroke-width="1"/>
  <text x="352" y="385" text-anchor="middle" class="label" transform="rotate(-90 352 385)">316 SS A</text>
  <text x="467" y="385" text-anchor="middle" class="label" transform="rotate(-90 467 385)">316 SS B</text>
  <text x="410" y="350" text-anchor="middle" class="label">~10mm gap</text>
  <text x="410" y="365" text-anchor="middle" class="note">water + fish</text>

  <!-- ========== DIVIDER / SENSE NODE ========== -->
  <rect x="360" y="430" width="100" height="30" class="component"/>
  <text x="410" y="450" text-anchor="middle" class="label">Rs 10k trimpot</text>

  <!-- ========== ENVELOPE DETECTOR ========== -->
  <rect x="360" y="520" width="40" height="25" class="component"/>
  <text x="380" y="555" text-anchor="middle" class="label">BAT43</text>
  <rect x="430" y="520" width="40" height="25" class="component"/>
  <text x="450" y="555" text-anchor="middle" class="label">Ce 100nF</text>
  <rect x="430" y="580" width="40" height="20" class="component"/>
  <text x="450" y="610" text-anchor="middle" class="label">Rb 100k</text>

  <!-- ========== MCP6002 OP-AMP ========== -->
  <rect x="560" y="520" width="120" height="80" rx="4" class="component"/>
  <circle cx="575" cy="535" r="5" fill="#333"/>
  <text x="620" y="555" text-anchor="middle" class="chip-label">MCP6002</text>
  <text x="620" y="575" text-anchor="middle" class="note">buffer → A0</text>

  <!-- ========== TM1637 DISPLAY ========== -->
  <rect x="720" y="100" width="180" height="60" rx="4" class="component"/>
  <text x="810" y="125" text-anchor="middle" class="chip-label">TM1637 Display</text>
  <text x="780" y="145" text-anchor="middle" class="label">CLK</text>
  <text x="840" y="145" text-anchor="middle" class="label">DIO</text>
  <text x="780" y="155" text-anchor="middle" class="label">→ D1</text>
  <text x="840" y="155" text-anchor="middle" class="label">→ D2</text>

  <!-- ========== BUTTONS ========== -->
  <rect x="950" y="240" width="60" height="40" rx="4" class="component"/>
  <text x="980" y="260" text-anchor="middle" class="label">Start/Stop</text>
  <text x="980" y="275" text-anchor="middle" class="label">→ D5</text>

  <rect x="950" y="300" width="60" height="40" rx="4" class="component"/>
  <text x="980" y="320" text-anchor="middle" class="label">Reset</text>
  <text x="980" y="335" text-anchor="middle" class="label">→ D6</text>

  <!-- ========== BUZZER ========== -->
  <rect x="950" y="370" width="60" height="40" rx="20" class="component"/>
  <text x="980" y="390" text-anchor="middle" class="label">Buzzer</text>
  <text x="980" y="405" text-anchor="middle" class="label">→ D7</text>

  <!-- ========== POWER SUPPLY ========== -->
  <rect x="360" y="720" width="140" height="70" rx="4" class="component"/>
  <text x="430" y="745" text-anchor="middle" class="chip-label">LM2596 Buck</text>
  <text x="430" y="765" text-anchor="middle" class="label">Set to 5V</text>
  <text x="430" y="780" text-anchor="middle" class="label">Vin 7-12V</text>

  <!-- ========== WIRES ========== -->

  <!-- 3V3 rail -->
  <line x1="730" y1="381" x2="640" y2="381" class="wire wire-red"/>
  <line x1="640" y1="381" x2="640" y2="550" class="wire wire-red"/>
  <line x1="640" y1="550" x2="620" y2="550" class="wire wire-red"/>
  <text x="660" y="375" class="label" fill="#c0392b">3V3</text>

  <!-- TLC555 VCC -->
  <line x1="170" y1="250" x2="200" y2="250" class="wire wire-red"/>
  <line x1="200" y1="250" x2="200" y2="200" class="wire wire-red"/>
  <line x1="200" y1="200" x2="640" y2="200" class="wire wire-red"/>
  <line x1="640" y1="200" x2="640" y2="381" class="wire wire-red"/>
  <text x="210" y="210" class="label" fill="#c0392b">VCC 3V3</text>

  <!-- TLC555 OUT to electrode A via Cb -->
  <rect x="230" y="280" width="30" height="20" class="component"/>
  <text x="245" y="315" text-anchor="middle" class="label">Cb 1µF</text>
  <line x1="75" y1="310" x2="230" y2="310" class="wire wire-blue"/>
  <line x1="260" y1="290" x2="260" y2="340" class="wire wire-blue"/>
  <line x1="260" y1="340" x2="345" y2="340" class="wire wire-blue"/>
  <text x="150" y="300" class="label" fill="#2980b9">~2kHz AC</text>

  <!-- Electrode B to GND via Cb -->
  <rect x="490" y="330" width="30" height="20" class="component"/>
  <text x="505" y="365" text-anchor="middle" class="label">Cb 1µF</text>
  <line x1="475" y1="340" x2="505" y2="340" class="wire wire-black"/>
  <line x1="505" y1="340" x2="505" y2="760" class="wire wire-black"/>
  <line x1="505" y1="760" x2="430" y2="760" class="wire wire-black"/>

  <!-- Rs trimpot connections -->
  <line x1="260" y1="340" x2="360" y2="445" class="wire wire-blue"/>
  <line x1="410" y1="430" x2="410" y2="415" class="wire wire-blue"/>
  <line x1="410" y1="415" x2="505" y2="415" class="wire wire-blue"/>
  <line x1="505" y1="415" x2="505" y2="340" class="wire wire-blue"/>

  <!-- SENSE node to BAT43 -->
  <line x1="410" y1="460" x2="410" y2="520" class="wire wire-green"/>
  <text x="420" y="500" class="label" fill="#27ae60">SENSE</text>

  <!-- Envelope detector to MCP6002 -->
  <line x1="450" y1="532" x2="560" y2="560" class="wire wire-purple"/>
  <text x="500" y="550" class="label" fill="#8e44ad">envelope</text>

  <!-- MCP6002 output to A0 -->
  <line x1="680" y1="560" x2="710" y2="560" class="wire wire-orange"/>
  <line x1="710" y1="560" x2="710" y2="481" class="wire wire-orange"/>
  <line x1="710" y1="481" x2="715" y2="481" class="wire wire-orange"/>
  <text x="690" y="545" class="label" fill="#e67e22">→ A0</text>

  <!-- GND rail -->
  <line x1="730" y1="406" x2="600" y2="406" class="wire wire-black"/>
  <line x1="600" y1="406" x2="600" y2="590" class="wire wire-black"/>
  <line x1="600" y1="590" x2="620" y2="590" class="wire wire-black"/>
  <line x1="600" y1="590" x2="450" y2="590" class="wire wire-black"/>
  <line x1="450" y1="590" x2="450" y2="600" class="wire wire-black"/>
  <text x="610" y="400" class="label" fill="#2c3e50">GND</text>

  <!-- TLC555 GND -->
  <line x1="80" y1="250" x2="60" y2="250" class="wire wire-black"/>
  <line x1="60" y1="250" x2="60" y2="760" class="wire wire-black"/>
  <line x1="60" y1="760" x2="360" y2="760" class="wire wire-black"/>

  <!-- Reset pin to VCC -->
  <line x1="80" y1="340" x2="60" y2="340" class="wire wire-red"/>
  <line x1="60" y1="340" x2="60" y2="250" class="wire wire-red"/>

  <!-- Ctrl pin bypass cap -->
  <rect x="190" y="340" width="25" height="15" class="component"/>
  <text x="202" y="365" text-anchor="middle" class="label">10nF</text>
  <line x1="190" y1="347" x2="170" y2="347" class="wire wire-gray"/>
  <line x1="190" y1="350" x2="60" y2="350" class="wire wire-black"/>

  <!-- Timing RC connections -->
  <line x1="75" y1="375" x2="75" y2="375" class="wire wire-gray"/>
  <line x1="75" y1="280" x2="75" y2="375" class="wire wire-gray"/>
  <line x1="75" y1="375" x2="50" y2="375" class="wire wire-gray"/>
  <line x1="100" y1="375" x2="120" y2="375" class="wire wire-gray"/>
  <line x1="170" y1="375" x2="190" y2="375" class="wire wire-gray"/>
  <line x1="210" y1="375" x2="210" y2="760" class="wire wire-black"/>

  <!-- VIN 5V from buck -->
  <line x1="500" y1="755" x2="800" y2="755" class="wire wire-red"/>
  <line x1="800" y1="755" x2="800" y2="405" class="wire wire-red"/>
  <line x1="800" y1="405" x2="890" y2="405" class="wire wire-red"/>
  <text x="650" y="745" class="label" fill="#c0392b">5V → VIN</text>

  <!-- Buck GND -->
  <line x1="360" y1="765" x2="300" y2="765" class="wire wire-black"/>
  <line x1="300" y1="765" x2="300" y2="770" class="wire wire-black"/>
  <text x="320" y="785" class="label" fill="#2c3e50">GND</text>

  <!-- TM1637 CLK/DIO -->
  <line x1="720" y1="280" x2="700" y2="280" class="wire wire-blue"/>
  <line x1="700" y1="280" x2="700" y2="130" class="wire wire-blue"/>
  <line x1="700" y1="130" x2="780" y2="130" class="wire wire-blue"/>
  <text x="690" y="150" class="label" fill="#2980b9">D1</text>

  <line x1="720" y1="300" x2="680" y2="300" class="wire wire-green"/>
  <line x1="680" y1="300" x2="680" y2="150" class="wire wire-green"/>
  <line x1="680" y1="150" x2="780" y2="150" class="wire wire-green"/>
  <text x="670" y="170" class="label" fill="#27ae60">D2</text>

  <!-- Buttons: each uses INPUT_PULLUP → GPIO, other terminal → GND -->
  <line x1="900" y1="260" x2="950" y2="260" class="wire wire-blue"/>
  <text x="920" y="250" class="label" fill="#2980b9">D5</text>
  <line x1="980" y1="280" x2="980" y2="760" class="wire wire-black"/>

  <line x1="900" y1="320" x2="950" y2="320" class="wire wire-green"/>
  <text x="920" y="310" class="label" fill="#27ae60">D6</text>
  <line x1="980" y1="340" x2="980" y2="760" class="wire wire-black"/>

  <!-- Buzzer -->
  <line x1="900" y1="310" x2="950" y2="390" class="wire wire-orange"/>
  <text x="920" y="360" class="label" fill="#e67e22">D7</text>
  <line x1="980" y1="410" x2="980" y2="760" class="wire wire-black"/>

  <!-- Power labels -->
  <text x="430" y="705" text-anchor="middle" class="note">LM2596 5V buck → NodeMCU VIN</text>

  <!-- Notes box -->
  <rect x="40" y="820" width="1020" height="60" rx="4" fill="#fff9e6" stroke="#f1c40f" stroke-width="1"/>
  <text x="60" y="845" class="note">
    Notes: 1) Power TLC555 and MCP6002 from NodeMCU 3V3 so A0 stays safe. 2) 1µF caps block DC — electrodes are AC-driven to prevent corrosion/electrolysis.
  </text>
  <text x="60" y="865" class="note">
    3) With clear water/no fish, trim Rs so A0 sits mid-scale. 4) Set DETECT_DELTA between empty-tube and fish-in-gap deviation from serial output.
  </text>
</svg>