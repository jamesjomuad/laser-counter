<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" width="900" height="750">
  <style>
    .chip { fill: #fafafa; stroke: #333; stroke-width: 2.5; }
    .pin-rect { fill: #ddd; stroke: #333; stroke-width: 1; }
    .wire { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .red { stroke: #c0392b; }
    .blk { stroke: #2c3e50; }
    .blu { stroke: #2980b9; }
    .grn { stroke: #27ae60; }
    .org { stroke: #e67e22; }
    .gry { stroke: #7f8c8d; }
    .title { font-family: Arial, sans-serif; font-size: 22px; font-weight: bold; fill: #2c3e50; }
    .sub { font-family: Arial, sans-serif; font-size: 13px; fill: #555; }
    .t14 { font-family: Arial, sans-serif; font-size: 14px; fill: #2c3e50; font-weight: bold; }
    .t12 { font-family: Arial, sans-serif; font-size: 12px; fill: #444; }
    .t11 { font-family: Arial, sans-serif; font-size: 11px; fill: #555; }
    .t10 { font-family: Arial, sans-serif; font-size: 10px; fill: #666; }
    .mono { font-family: 'Courier New', monospace; font-size: 12px; fill: #c0392b; font-weight: bold; }
    .mono-blk { font-family: 'Courier New', monospace; font-size: 12px; fill: #2c3e50; font-weight: bold; }
    .dot { fill: #333; }
    .box { rx: 4; stroke-width: 1.5; }
    .box-res { fill: #fff3e0; stroke: #e67e22; }
    .box-cap { fill: #e8f4f8; stroke: #2980b9; }
    .box-warn { fill: #fef2f2; stroke: #dc2626; stroke-width: 2; }
    .box-info { fill: #fafafa; stroke: #ccc; stroke-width: 1; }
    .box-yellow { fill: #fff9e6; stroke: #f1c40f; stroke-width: 1.5; }
    .badge { fill: #dc2626; stroke: none; }
    .badge-text { font-family: Arial, sans-serif; font-size: 11px; fill: #fff; font-weight: bold; }
    .pass { fill: #059669; font-weight: bold; font-family: 'Courier New', monospace; font-size: 12px; }
    .fail { fill: #dc2626; font-weight: bold; font-family: 'Courier New', monospace; font-size: 12px; }
  </style>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" class="title">NE555 — Astable Multivibrator (~2.15 kHz)</text>
  <text x="450" y="52" text-anchor="middle" class="sub">Bipolar 555 Timer — <tspan fill="#dc2626" font-weight="bold">NOT compatible</tspan> with 3.3 V NodeMCU power</text>

  <rect x="200" y="65" width="500" height="26" rx="5" class="badge"/>
  <text x="450" y="83" text-anchor="middle" class="badge-text">✗ DO NOT BUY for this project — requires ≥ 4.5 V supply rail</text>

  <!-- ====== TOP: VCC RAIL ====== -->
  <line x1="30" y1="120" x2="310" y2="120" class="wire red"/>
  <text x="20" y="125" text-anchor="end" class="mono" fill="#c0392b">VCC</text>
  <text x="25" y="140" text-anchor="end" class="t10" fill="#dc2626">≥ 4.5 V</text>

  <!-- ====== BOTTOM: GND RAIL ====== -->
  <line x1="30" y1="520" x2="460" y2="520" class="wire blk"/>
  <text x="20" y="524" text-anchor="end" class="mono-blk">GND</text>

  <!-- ====== NE555 CHIP (centered, clean pins) ====== -->
  <rect x="160" y="145" width="150" height="190" rx="5" class="chip"/>

  <!-- Notch dot -->
  <circle cx="178" cy="162" r="5" fill="#333"/>

  <text x="235" y="195" text-anchor="middle" class="t14">NE555</text>
  <text x="235" y="213" text-anchor="middle" class="t10">Bipolar 555</text>

  <!-- Pin number label row inside chip -->
  <text x="238" y="250" text-anchor="middle" class="t10">1  2  3  4</text>
  <text x="238" y="290" text-anchor="middle" class="t10">8  7  6  5</text>

  <!-- ====== LEFT PINS (pins 1-4) ====== -->
  <!-- Pin 1: GND -->
  <rect x="148" y="160" width="18" height="14" class="pin-rect"/>
  <text x="140" y="171" text-anchor="end" class="t11">GND (1)</text>

  <!-- Pin 2: TRIG -->
  <rect x="148" y="182" width="18" height="14" class="pin-rect"/>
  <text x="140" y="193" text-anchor="end" class="t11">TRIG (2)</text>

  <!-- Pin 3: OUT -->
  <rect x="148" y="204" width="18" height="14" class="pin-rect"/>
  <text x="140" y="215" text-anchor="end" class="t11">OUT (3)</text>

  <!-- Pin 4: RESET -->
  <rect x="148" y="226" width="18" height="14" class="pin-rect"/>
  <text x="140" y="237" text-anchor="end" class="t11">RESET (4)</text>

  <!-- ====== RIGHT PINS (pins 5-8) ====== -->
  <!-- Pin 5: CTRL -->
  <rect x="304" y="160" width="18" height="14" class="pin-rect"/>
  <text x="332" y="171" class="t11">CTRL (5)</text>

  <!-- Pin 6: THRESH -->
  <rect x="304" y="182" width="18" height="14" class="pin-rect"/>
  <text x="332" y="193" class="t11">THRESH (6)</text>

  <!-- Pin 7: DISCH -->
  <rect x="304" y="204" width="18" height="14" class="pin-rect"/>
  <text x="332" y="215" class="t11">DISCH (7)</text>

  <!-- Pin 8: VCC -->
  <rect x="304" y="226" width="18" height="14" class="pin-rect"/>
  <text x="332" y="237" class="t11">VCC (8)</text>

  <!-- ====== CHIP WIRING ====== -->

  <!-- Pin 8 (VCC) → top VCC rail -->
  <line x1="310" y1="233" x2="310" y2="120" class="wire red"/>

  <!-- Pin 1 (GND) → bottom GND rail -->
  <line x1="160" y1="167" x2="160" y2="520" class="wire blk"/>

  <!-- Pin 4 (RESET) → VCC (tie high) -->
  <line x1="157" y1="233" x2="125" y2="233" class="wire red"/>
  <line x1="125" y1="233" x2="125" y2="120" class="wire red"/>
  <circle cx="125" cy="120" r="3.5" class="dot"/>

  <!-- Pin 5 (CTRL) → 10nF bypass → GND -->
  <line x1="322" y1="167" x2="460" y2="167" class="wire gry"/>
  <rect x="460" y="152" width="35" height="30" rx="3" fill="#e8f4f8" stroke="#7f8c8d" stroke-width="1.5"/>
  <text x="477" y="168" text-anchor="middle" class="mono" fill="#7f8c8d">10nF</text>
  <text x="477" y="180" text-anchor="middle" class="t10">bypass</text>
  <!-- cap to GND -->
  <line x1="477" y1="182" x2="477" y2="520" class="wire blk"/>

  <!-- ====== TIMING NETWORK: R1, R2, Ct (BELOW the chip, neat layout) ====== -->

  <!-- Pin 7 (DISCH) wire going down -->
  <line x1="310" y1="211" x2="310" y2="320" class="wire org"/>

  <!-- Junction node at (310, 320) -->
  <circle cx="310" cy="320" r="4" class="dot"/>

  <!-- R1: from junction → left → up to VCC -->
  <line x1="310" y1="320" x2="200" y2="320" class="wire org"/>
  <line x1="200" y1="320" x2="200" y2="120" class="wire org"/>
  <circle cx="200" cy="120" r="3.5" class="dot"/>

  <!-- R1 component box -->
  <rect x="195" y="270" width="50" height="25" rx="3" class="box box-res"/>
  <text x="220" y="286" text-anchor="middle" class="t11">R1</text>
  <text x="220" y="300" text-anchor="middle" class="mono">1 kΩ</text>

  <!-- R2: from junction → right → down to THRESH/TRIG node -->
  <line x1="310" y1="320" x2="370" y2="320" class="wire org"/>

  <!-- R2 component box -->
  <rect x="370" y="270" width="50" height="25" rx="3" class="box box-res"/>
  <text x="395" y="286" text-anchor="middle" class="t11">R2</text>
  <text x="395" y="300" text-anchor="middle" class="mono">33 kΩ</text>

  <!-- Pin 6 (THRESH) wire going down -->
  <line x1="310" y1="189" x2="310" y2="380" class="wire blu"/>
  <!-- Pin 2 (TRIG) wire going down and joining THRESH -->
  <line x1="157" y1="189" x2="157" y2="380" class="wire blu"/>
  <line x1="157" y1="380" x2="310" y2="380" class="wire blu"/>

  <!-- THRESH/TRIG junction node -->
  <circle cx="310" cy="380" r="4" class="dot"/>

  <!-- Connect R2 output end to THRESH/TRIG junction -->
  <line x1="420" y1="320" x2="420" y2="380" class="wire org"/>
  <line x1="310" y1="380" x2="420" y2="380" class="wire org"/>
  <circle cx="420" cy="380" r="3.5" class="dot"/>

  <!-- Ct: from THRESH/TRIG junction → GND -->
  <line x1="310" y1="380" x2="310" y2="470" class="wire blu"/>

  <!-- Ct component box -->
  <rect x="292" y="425" width="50" height="25" rx="3" class="box box-cap"/>
  <text x="317" y="441" text-anchor="middle" class="t11">Ct</text>
  <text x="317" y="455" text-anchor="middle" class="mono" fill="#2980b9">10nF</text>

  <!-- Ct bottom → GND -->
  <line x1="317" y1="450" x2="317" y2="520" class="wire blk"/>

  <!-- ====== OUTPUT PATH: Pin 3 → Cb → Rs → SENSE ====== -->

  <!-- Pin 3 (OUT) going left -->
  <line x1="148" y1="211" x2="80" y2="211" class="wire grn"/>

  <!-- Cb coupling cap -->
  <line x1="80" y1="211" x2="80" y2="355" class="wire grn"/>

  <rect x="60" y="355" width="40" height="25" rx="3" class="box box-cap"/>
  <text x="80" y="371" text-anchor="middle" class="t11">Cb</text>
  <text x="80" y="384" text-anchor="middle" class="mono" fill="#2980b9">1µF</text>

  <!-- Rs AFTER Cb, going right to SENSE -->
  <line x1="80" y1="380" x2="80" y2="440" class="wire grn"/>

  <rect x="55" y="440" width="50" height="25" rx="3" class="box box-res"/>
  <text x="80" y="456" text-anchor="middle" class="t11">Rs</text>
  <text x="80" y="470" text-anchor="middle" class="mono">10kΩ</text>

  <!-- Rs bottom → GND -->
  <line x1="80" y1="465" x2="80" y2="520" class="wire blk"/>

  <!-- SENSE node (the tap point between Cb/Rs and electrode A) -->
  <text x="130" y="446" class="t11" fill="#27ae60">SENSE</text>
  <circle cx="155" cy="440" r="5" fill="#27ae60"/>

  <!-- SENSE → electrode A -->
  <line x1="160" y1="440" x2="220" y2="440" class="wire grn"/>

  <!-- ====== ELECTRODE ASSEMBLY (right side, clean) ====== -->

  <!-- Tube boundary -->
  <rect x="220" y="390" width="240" height="100" rx="6" fill="#f4fafd" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="340" y="413" text-anchor="middle" class="t11">12 mm ID Transfer Tube</text>

  <!-- Electrode A (316 SS ring) -->
  <rect x="235" y="400" width="14" height="60" rx="2" fill="#bdc3c7" stroke="#555" stroke-width="1.5"/>
  <text x="242" y="470" text-anchor="middle" class="t10">SS</text>
  <text x="242" y="480" text-anchor="middle" class="t10">A</text>

  <!-- Electrode B (316 SS ring) -->
  <rect x="430" y="400" width="14" height="60" rx="2" fill="#bdc3c7" stroke="#555" stroke-width="1.5"/>
  <text x="437" y="470" text-anchor="middle" class="t10">SS</text>
  <text x="437" y="480" text-anchor="middle" class="t10">B</text>

  <!-- Gap labels -->
  <text x="340" y="440" text-anchor="middle" class="mono" fill="#2980b9">~10 mm gap</text>
  <text x="340" y="454" text-anchor="middle" class="t10">—— water + fingerling ——</text>

  <!-- AC field lines (simple waves) -->
  <path d="M 249 425 Q 340 410 430 425" fill="none" stroke="#e67e22" stroke-width="1.3"/>
  <path d="M 249 435 Q 340 420 430 435" fill="none" stroke="#e67e22" stroke-width="1.3"/>

  <!-- Electrode B → Cb2 → GND -->
  <line x1="444" y1="440" x2="500" y2="440" class="wire blk"/>
  <rect x="500" y="425" width="32" height="22" rx="3" class="box box-cap"/>
  <text x="516" y="440" text-anchor="middle" class="t11">Cb</text>
  <text x="516" y="452" text-anchor="middle" class="mono" fill="#2980b9">1µF</text>
  <line x1="532" y1="436" x2="550" y2="436" class="wire blk"/>
  <line x1="550" y1="436" x2="550" y2="520" class="wire blk"/>

  <!-- ====== RIGHT PANEL: TLC555 vs NE555 table ====== -->

  <rect x="580" y="105" width="290" height="350" rx="5" class="box box-info"/>
  <text x="725" y="128" text-anchor="middle" class="t12">TLC555 vs NE555</text>

  <!-- Table header -->
  <rect x="595" y="140" width="130" height="20" rx="2" fill="#333"/>
  <text x="660" y="154" text-anchor="middle" class="badge-text" font-size="10">Parameter</text>
  <rect x="725" y="140" width="65" height="20" rx="2" fill="#059669"/>
  <text x="757" y="154" text-anchor="middle" class="badge-text" font-size="10">TLC555</text>
  <rect x="790" y="140" width="65" height="20" rx="2" fill="#dc2626"/>
  <text x="822" y="154" text-anchor="middle" class="badge-text" font-size="10">NE555</text>

  <!-- Row 1 -->
  <rect x="595" y="160" width="130" height="18" fill="#eee"/>
  <text x="660" y="173" text-anchor="middle" class="t10">Min Vcc</text>
  <text x="757" y="173" text-anchor="middle" class="pass" font-size="10">2.0 V</text>
  <text x="822" y="173" text-anchor="middle" class="fail" font-size="10">4.5 V</text>

  <!-- Row 2 -->
  <rect x="595" y="178" width="130" height="18" fill="#fff"/>
  <text x="660" y="191" text-anchor="middle" class="t10">Max Vcc</text>
  <text x="757" y="191" text-anchor="middle" class="pass" font-size="10">15 V</text>
  <text x="822" y="191" text-anchor="middle" class="fail" font-size="10">16 V</text>

  <!-- Row 3 -->
  <rect x="595" y="196" width="130" height="18" fill="#eee"/>
  <text x="660" y="209" text-anchor="middle" class="t10">Supply Icc</text>
  <text x="757" y="209" text-anchor="middle" class="pass" font-size="10">~210 µA</text>
  <text x="822" y="209" text-anchor="middle" class="fail" font-size="10">~6 mA</text>

  <!-- Row 4 -->
  <rect x="595" y="214" width="130" height="18" fill="#fff"/>
  <text x="660" y="227" text-anchor="middle" class="t10">Output drive</text>
  <text x="757" y="227" text-anchor="middle" class="pass" font-size="10">~10 mA</text>
  <text x="822" y="227" text-anchor="middle" class="fail" font-size="10">~200 mA</text>

  <!-- Row 5 -->
  <rect x="595" y="232" width="130" height="18" fill="#eee"/>
  <text x="660" y="245" text-anchor="middle" class="t10">Max freq</text>
  <text x="757" y="245" text-anchor="middle" class="pass" font-size="10">~3 MHz</text>
  <text x="822" y="245" text-anchor="middle" class="fail" font-size="10">~500 kHz</text>

  <!-- Row 6 -->
  <rect x="595" y="250" width="130" height="18" fill="#fff"/>
  <text x="660" y="263" text-anchor="middle" class="t10">Technology</text>
  <text x="757" y="263" text-anchor="middle" class="pass" font-size="10">CMOS</text>
  <text x="822" y="263" text-anchor="middle" class="fail" font-size="10">Bipolar</text>

  <!-- Row 7 -->
  <rect x="595" y="268" width="130" height="18" fill="#eee"/>
  <text x="660" y="281" text-anchor="middle" class="t10">Runs @ 3.3 V?</text>
  <text x="757" y="281" text-anchor="middle" class="pass" font-size="10">YES</text>
  <text x="822" y="281" text-anchor="middle" class="fail" font-size="10">NO</text>

  <!-- Verdict box -->
  <rect x="595" y="300" width="260" height="60" rx="4" class="box box-warn"/>
  <text x="725" y="320" text-anchor="middle" class="mono" fill="#dc2626" font-size="13">NE555 WON'T OSCILLATE @ 3.3V</text>
  <text x="725" y="338" text-anchor="middle" class="t10" fill="#dc2626">Internal bipolar transistors need ≥ 4.5 V</text>
  <text x="725" y="352" text-anchor="middle" class="t10" fill="#dc2626">to bias. NodeMCU provides only 3.3 V.</text>

  <!-- Alternatives -->
  <text x="595" y="385" class="t11" font-weight="bold">Use instead (all pin-compatible DIP-8):</text>
  <text x="600" y="403" class="pass" font-size="11">✓ TLC555CP</text>
  <text x="600" y="418" class="pass" font-size="11">✓ LMC555</text>
  <text x="600" y="433" class="pass" font-size="11">✓ ICM7555</text>
  <text x="600" y="450" class="t10">All: CMOS, 2.0 V min, drop-in replacement</text>

  <!-- ====== BOTTOM: Freq formula + Notes ====== -->

  <rect x="30" y="580" width="840" height="50" rx="5" class="box box-info"/>
  <text x="450" y="600" text-anchor="middle" class="t12">Frequency (same formula for both TLC555 and NE555)</text>
  <text x="450" y="618" text-anchor="middle" class="mono" fill="#2980b9">f = 1.44 / ((R1 + 2*R2) * Ct) = 1.44 / ((1k + 2*33k) * 10nF) ≈ 2.15 kHz</text>

  <rect x="30" y="645" width="840" height="85" rx="5" class="box box-yellow"/>
  <text x="45" y="668" class="t11" font-weight="bold">Notes for beginners:</text>
  <text x="45" y="688" class="t10">• The NE555 is <tspan font-weight="bold" fill="#dc2626">bipolar</tspan> (uses NPN/PNP transistors internally). It needs at least 4.5 V for the internal comparators and current mirrors to bias correctly.</text>
  <text x="45" y="705" class="t10">• The <tspan font-weight="bold" fill="#059669">TLC555 / LMC555 / ICM7555</tspan> are all <tspan font-weight="bold" fill="#059669">CMOS</tspan> (MOSFET-based) and run happily from 2.0 V up to 15 V.</text>
  <text x="45" y="722" class="t10">• The astable circuit (R1, R2, Ct around pins 6-7-2) is identical for all 555 variants — only the minimum Vcc differs.</text>
</svg>
